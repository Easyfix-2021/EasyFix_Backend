# EasyFix QA stack — runs on the EC2 at /opt/easyfix/docker-compose.yml.
#
# This file is the single source of truth for what's running. Both
# services are defined here; their respective GitHub Actions workflows
# update the source code on disk + run `docker compose build <service>`
# followed by `docker compose up -d <service>` over SSM.
#
# Build mode (current): images are built ON the EC2 from cloned repos.
# Migration target: when ECR is set up later, switch each `build:` block
# to `image:` and the workflows to docker push. See AWS_QA_BOOTSTRAP.md
# §"Migrate to ECR (later)" for the recipe.
#
# Repository layout assumed on the EC2 (created by bootstrap):
#   /opt/easyfix/                     ← cwd for docker compose
#     ├── docker-compose.yml          ← THIS FILE
#     ├── .env                        ← compose-time vars (NEXT_PUBLIC_API_URL)
#     ├── backend.env                 ← runtime secrets for the backend container
#     └── repos/
#         ├── EasyFix_Backend/        ← git clone, branch QA
#         └── Easyfix_CRM_UI/         ← git clone, branch QA

services:
  backend:
    container_name: easyfix-backend
    restart: unless-stopped
    build:
      # Path is relative to this docker-compose.yml. The bootstrap clones
      # the backend repo to /opt/easyfix/repos/EasyFix_Backend.
      context: ./repos/EasyFix_Backend
      dockerfile: Dockerfile
    env_file:
      # Real secrets live HERE on the host filesystem (chmod 600), not
      # in the image, not in GitHub. Bootstrap creates this from a
      # template; deploys never touch it.
      - /opt/easyfix/backend.env
    ports:
      # host:5100 → container:5100. Tighten to 127.0.0.1:5100 if/when
      # nginx fronts it.
      - "5100:5100"
    networks:
      - easyfix-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5100/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  crm-ui:
    container_name: easyfix-crm-ui
    restart: unless-stopped
    build:
      context: ./repos/Easyfix_CRM_UI
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is BAKED INTO the static JS chunks at build
        # time. Compose auto-loads /opt/easyfix/.env for variable
        # interpolation, so this value comes from there. The Dockerfile
        # fails the build if this is empty or the placeholder.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NODE_ENV: production
      PORT: "5180"
    ports:
      - "5180:5180"
    networks:
      - easyfix-net
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5180/login", "-O", "/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  easyfix-net:
    driver: bridge
