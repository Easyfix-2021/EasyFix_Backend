# EasyFix QA stack — runs on the EC2 at /opt/easyfix/docker-compose.yml.
#
# This file is the single source of truth for what's running. Both
# services pull pre-built images from AWS ECR; the GitHub Actions
# workflows build + push, then SSM-tell this box to `compose pull`
# the new tag and recreate the container.
#
# Image tags come from /opt/easyfix/.env (auto-loaded by docker compose):
#   BACKEND_IMAGE=902810393464.dkr.ecr.ap-south-1.amazonaws.com/easyfix/backend:qa-<sha>
#   CRM_UI_IMAGE=902810393464.dkr.ecr.ap-south-1.amazonaws.com/easyfix/crm-ui:qa-<sha>
#
# The workflows update the relevant variable on each deploy via
# `sed -i` over /opt/easyfix/.env — backend deploys never touch the
# CRM_UI_IMAGE line and vice versa.
#
# ECR pull authenticates via the EC2 instance profile's
# AmazonEC2ContainerRegistryReadOnly policy + the
# amazon-ecr-credential-helper installed on the box. No `docker login`
# is ever required.

services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: easyfix-backend
    restart: unless-stopped
    env_file:
      # Real secrets live HERE on the host filesystem (chmod 600).
      # Managed via deploy/bootstrap-env.sh — never in any image, never
      # in git, never in GitHub Secrets.
      - /opt/easyfix/backend.env
    ports:
      # host:5100 → container:5100. Tighten to 127.0.0.1:5100 if/when
      # nginx fronts it.
      - "5100:5100"
    networks:
      - easyfix-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5100/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  crm-ui:
    image: ${CRM_UI_IMAGE}
    container_name: easyfix-crm-ui
    restart: unless-stopped
    # NEXT_PUBLIC_API_URL is BAKED INTO the static JS chunks at build
    # time (in CI, via --build-arg). The container itself doesn't need
    # any runtime env vars beyond NODE_ENV / PORT, which are set by the
    # Dockerfile. Don't add an env_file here unless server-side runtime
    # secrets become a thing (they currently don't).
    environment:
      NODE_ENV: production
      PORT: "5180"
    ports:
      - "5180:5180"
    networks:
      - easyfix-net
    depends_on:
      # Soft dep — compose starts backend FIRST so SSR fetches at boot
      # don't 502.
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5180/login", "-O", "/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────
  # Dozzle — web UI for live Docker logs (https://dozzle.dev).
  # Visit http://<ec2-private-ip>:8888 from the VPN to see live,
  # searchable logs for backend + crm-ui in your browser. Multi-
  # container tabs, regex filter, real-time follow.
  #
  # SECURITY POSTURE — network-only:
  # No app-level auth. The EC2 is in a private subnet; reaching :8888
  # at all requires being on the AWS Client VPN, which is the trust
  # boundary. The Docker socket is mounted READ-ONLY (`:ro`) so even
  # if Dozzle had a vulnerability, it can't mutate Docker state — only
  # read container metadata + logs.
  #
  # If you ever expose this EC2 to the public internet, add
  # DOZZLE_AUTH_PROVIDER=simple + a users.yml volume mount before doing
  # so. Search "Dozzle authentication" in dozzle.dev for the recipe.
  dozzle:
    image: amir20/dozzle:latest
    container_name: easyfix-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_HOSTNAME: "EasyFix QA"
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - easyfix-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  easyfix-net:
    driver: bridge
