# EasyFix_Backend — auto-deploy to QA in-house server (192.168.1.211)
#
# Runs on a SELF-HOSTED runner installed inside the QA LAN — see
# docs/QA_INHOUSE_DEPLOYMENT.md for one-time runner setup.
#
# Why a separate workflow from deploy.yml:
#   deploy.yml targets the Production AWS EC2 host (public IP, ssh from
#   ubuntu-latest). QA used to live on AWS too, but moved to an in-house
#   server at 192.168.x.x — a LAN address reachable only through VPN, so a
#   github-hosted runner can't reach it. A self-hosted runner avoids that
#   problem entirely: it lives on the QA LAN and just deploys to itself
#   (or to other LAN hosts via local SSH).
#
# Triggers
#   push → QA branch
#   manual workflow_dispatch
#
# Pipeline per push:
#   1. Lint/syntax-check on a hosted runner (cheap, parallel safety net)
#   2. Self-hosted runner pulls latest, npm ci, test:db, pm2 reload
#   3. Smoke-test /api/health + /api/health/db locally on the LAN
#
# Secrets required (Settings → Secrets and variables → Actions):
#   MAIL_USERNAME, MAIL_PASSWORD   (Gmail SMTP for failure notifications;
#                                    same secrets the EC2 deploy.yml uses)
# No SSH keys / hostnames needed — the runner deploys to localhost.

name: Deploy to QA In-house

on:
  push:
    branches: [QA]
  workflow_dispatch: {}

# One in-flight deploy at a time on this runner — newer commits supersede.
concurrency:
  group: deploy-qa-inhouse
  cancel-in-progress: true

jobs:
  # Stage 1 — cheap lint on a hosted runner. Doing this BEFORE we hand off to
  # the self-hosted runner means a syntax error fails fast and never reaches
  # the QA box, even if the self-hosted runner is offline.
  build:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      - name: Syntax-check critical services
        run: |
          node --check server/index.js
          node --check services/auto-assign.service.js
          node --check services/job.service.js
          node --check services/settings.service.js
          node --check services/webhook.service.js || true

  # Stage 2 — the actual deploy. Runs on the self-hosted runner that lives
  # on the QA LAN. `runs-on` matches the labels we set during runner config
  # (./config.sh --labels qa-inhouse,linux,x64).
  deploy:
    name: Deploy to QA in-house
    needs: build
    runs-on: [self-hosted, qa-inhouse]
    timeout-minutes: 15
    steps:
      - name: Checkout
        # The self-hosted runner has its own working directory; checkout into
        # a clean folder so we don't accumulate cruft across runs. The actual
        # deploy is git-based on the LIVE app dir below — this checkout is
        # only used for the deploy script and any pre-flight checks.
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy
        # Deploy script does the real work — kept in version control so it's
        # easy to review + reuse from a manual SSH session if CI is down.
        run: bash scripts/deploy-qa-inhouse.sh

      - name: Smoke-test deployed API
        # Self-hosted runner is ON the LAN, so localhost works. If the app
        # binds 0.0.0.0:5100, this hits the same socket Nginx forwards to.
        run: |
          for path in "/api/health" "/api/health/db" "/api/integration/_ping"; do
            ok=0
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:5100${path}" || echo 000)
              if [[ "$code" =~ ^2 ]]; then
                echo "✓ ${path} → $code"
                ok=1
                break
              fi
              echo "Attempt $i: ${path} → $code, retrying in 5s…"
              sleep 5
            done
            [[ $ok -eq 1 ]] || { echo "✗ ${path} never returned 2xx"; exit 1; }
          done

      - name: Notify by email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Deploy FAILED] EasyFix_Backend → QA in-house (${{ github.sha }})"
          to: harshit@channelplay.in
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Backend deploy to QA in-house FAILED.

            Branch:       ${{ github.ref_name }}
            Commit:       ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Run URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Open the Run URL above for the full job logs.
